<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nescafe Booth Tracker</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel Standalone CDN -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes apiMembara {
          0% { background-position: 0% 50%; box-shadow: inset 0 0 10px rgba(255,0,0,0.8), 0 0 4px rgba(255,69,0,0.6); }
          50% { background-position: 100% 50%; box-shadow: inset 0 0 16px rgba(255,69,0,1), 0 0 10px rgba(255,140,0,0.9); }
          100% { background-position: 0% 50%; box-shadow: inset 0 0 10px rgba(255,0,0,0.8), 0 0 4px rgba(255,69,0,0.6); }
        }
        
        .shift-api-long {
          background: linear-gradient(-45deg, #e11d48, #ea580c, #ca8a04, #e11d48) !important;
          background-size: 300% 300% !important;
          animation: apiMembara 1.5s ease infinite !important;
          color: #ffffff !important;
          border: 1px solid #9f1239 !important;
          text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
        }

        .shift-biru-pagi {
          background-color: #0284c7 !important;
          color: #ffffff !important;
          border-color: #0369a1 !important;
        }

        .shift-kuning-sore {
          background-color: #eab308 !important;
          color: #1e293b !important;
          border-color: #ca8a04 !important;
        }

        .shift-dongker-off {
          background-color: #0f172a !important;
          color: #ffffff !important;
          border-color: #1e293b !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React

        const TARIF = {
          Pagi: 70000,
          Sore: 70000,
          Long: 140000,
          Libur: 0
        }

        const DATA_AWAL = {}

        const dapatkanDataLokal = (key, nilaiBawaan) => {
          try {
            const saved = localStorage.getItem(key)
            return saved ? JSON.parse(saved) : nilaiBawaan
          } catch (e) {
            return nilaiBawaan
          }
        }

        const simpanDataLokal = (key, data) => {
          try {
            localStorage.setItem(key, JSON.stringify(data))
          } catch (e) {
            // Berjalan aman jika penyimpanan lokal diblokir browser
          }
        }

        function App() {
          const [dataShift, setDataShift] = useState(() => {
            return dapatkanDataLokal('nescafe_shifts_github', DATA_AWAL)
          })

          const [statusGaji, setStatusGaji] = useState(() => {
            return dapatkanDataLokal('nescafe_status_gaji_github', {})
          })

          const tanggalSekarang = new Date(2026, 6, 8)
          const [tahunAktif, setTahunAktif] = useState(tanggalSekarang.getFullYear())
          const [bulanAktif, setBulanAktif] = useState(tanggalSekarang.getMonth())
          
          const [tabAktif, setTabAktif] = useState('kalender')

          const [tanggalPilihan, setTanggalPilihan] = useState(null)
          const [tipeShiftPilihan, setTipeShiftPilihan] = useState('Libur')
          const [catatanPilihan, setCatatanPilihan] = useState('')
          const [tampilkanModal, setTampilkanModal] = useState(false)
          const [tampilkanFilterModal, setTampilkanFilterModal] = useState(false)
          
          // State baru untuk multi-bulan filter akumulasi
          const [selectedFilterMonths, setSelectedFilterMonths] = useState(() => {
            const blnFormat = String(tanggalSekarang.getMonth() + 1).padStart(2, '0')
            return [`${tanggalSekarang.getFullYear()}-${blnFormat}`]
          })
          const [tampilkanMultiFilterModal, setTampilkanMultiFilterModal] = useState(false)
          const [tempSelectedMonths, setTempSelectedMonths] = useState([])

          const [sudahTercatat, setSudahTercatat] = useState(false)
          const [tampilkanKonfirmasiHapus, setTampilkanKonfirmasiHapus] = useState(false)
          const [tampilkanKonfirmasiKosongkan, setTampilkanKonfirmasiKosongkan] = useState(false)

          const [tempBulan, setTempBulan] = useState(bulanAktif)
          const [tempTahun, setTempTahun] = useState(tahunAktif)

          const [notifikasi, setNotifikasi] = useState(null)

          const [tampilkanModalLaporan, setTampilkanModalLaporan] = useState(false)
          const [tipeLaporan, setTipeLaporan] = useState('tutupBuku')
          const [namaKaryawan, setNamaKaryawan] = useState(() => {
            return dapatkanDataLokal('nescafe_nama_karyawan_github', '')
          })

          useEffect(() => {
            simpanDataLokal('nescafe_shifts_github', dataShift)
          }, [dataShift])

          useEffect(() => {
            simpanDataLokal('nescafe_nama_karyawan_github', namaKaryawan)
          }, [namaKaryawan])

          useEffect(() => {
            simpanDataLokal('nescafe_status_gaji_github', statusGaji)
          }, [statusGaji])

          const pemicuNotifikasi = (pesan) => {
            setNotifikasi(pesan)
            setTimeout(() => {
              setNotifikasi(null)
            }, 3000)
          }

          const daftarBulan = [
            "Januari", "Februari", "Maret", "April", "Mei", "Juni",
            "Juli", "Agustus", "September", "Oktober", "November", "Desember"
          ]

          const daftarTahun = [2025, 2026, 2027]

          const formatKeKey = (tahun, month, date) => {
            const b = String(month + 1).padStart(2, '0')
            const t = String(date).padStart(2, '0')
            return `${tahun}-${b}-${t}`
          }

          const geserKiri = () => {
            if (bulanAktif === 0) {
              setBulanAktif(11)
              setTahunAktif(prev => prev - 1)
            } else {
              setBulanAktif(prev => prev - 1)
            }
          }

          const geserKanan = () => {
            if (bulanAktif === 11) {
              setBulanAktif(0)
              setTahunAktif(prev => prev + 1)
            } else {
              setBulanAktif(prev => prev + 1)
            }
          }

          const jumlahHari = new Date(tahunAktif, bulanAktif + 1, 0).getDate()
          const hariPertama = new Date(tahunAktif, bulanAktif, 1).getDay()

          const hitungGajiMurniBulan = (thn, bln) => {
            const jlhHari = new Date(thn, bln + 1, 0).getDate()
            let total = 0
            let pagi = 0
            let sore = 0
            let long = 0
            let rincian = []

            for (let tgl = 1; tgl <= jlhHari; tgl++) {
              const key = formatKeKey(thn, bln, tgl)
              const shift = dataShift[key]
              if (shift && shift.tipe !== 'Libur') {
                const tarif = TARIF[shift.tipe] || 0
                total += tarif
                if (shift.tipe === 'Pagi') pagi++
                if (shift.tipe === 'Sore') sore++
                if (shift.tipe === 'Long') long++

                rincian.push({
                  tanggal: tgl,
                  tipe: shift.tipe,
                  gaji: tarif,
                  catatan: shift.catatan
                })
              }
            }
            return { total, pagi, sore, long, rincian }
          }

          // Perhitungan Multi-Bulan untuk Akumulasi Filter
          const hitungGajiMultiBulan = (arrayBulanTahun) => {
            let total = 0
            let pagi = 0
            let sore = 0
            let long = 0

            Object.keys(dataShift).forEach(key => {
              const blnTahunKey = key.substring(0, 7) // Mengambil bagian 'YYYY-MM'
              if (arrayBulanTahun.includes(blnTahunKey)) {
                const shift = dataShift[key]
                if (shift && shift.tipe !== 'Libur') {
                  const tarif = TARIF[shift.tipe] || 0
                  total += tarif
                  if (shift.tipe === 'Pagi') pagi++
                  if (shift.tipe === 'Sore') sore++
                  if (shift.tipe === 'Long') long++
                }
              }
            })

            return { total, pagi, sore, long }
          }

          const hitungGajiTutupBuku = () => {
            const tglAwal = new Date(tahunAktif, bulanAktif - 1, 21)
            const tglAkhir = new Date(tahunAktif, bulanAktif, 20)

            let total = 0
            let pagi = 0
            let sore = 0
            let long = 0

            let loop = new Date(tglAwal)

            while (loop <= tglAkhir) {
              const key = formatKeKey(loop.getFullYear(), loop.getMonth(), loop.getDate())
              const shift = dataShift[key]
              if (shift && shift.tipe !== 'Libur') {
                const tarif = TARIF[shift.tipe] || 0
                total += tarif
                if (shift.tipe === 'Pagi') pagi++
                if (shift.tipe === 'Sore') sore++
                if (shift.tipe === 'Long') long++
              }
              loop.setDate(loop.getDate() + 1)
            }

            return {
              total,
              pagi,
              sore,
              long,
              labelPeriode: `21 ${daftarBulan[tglAwal.getMonth()]} - 20 ${daftarBulan[tglAkhir.getMonth()]}`,
              labelGajian: `25 ${daftarBulan[bulanAktif]} ${tahunAktif}`
            }
          }

          const hitungAkumulasiSemua = () => {
            let pagi = 0
            let sore = 0
            let long = 0
            let total = 0
            Object.keys(dataShift).forEach(key => {
              const item = dataShift[key]
              if (item && item.tipe !== 'Libur') {
                const tarif = TARIF[item.tipe] || 0
                total += tarif
                if (item.tipe === 'Pagi') pagi++
                if (item.tipe === 'Sore') sore++
                if (item.tipe === 'Long') long++
              }
            })
            return { total, pagi, sore, long }
          }

          const murni = hitungGajiMurniBulan(tahunAktif, bulanAktif)
          const tutupBuku = hitungGajiTutupBuku()
          const akumulasiSemua = hitungAkumulasiSemua()
          
          // Hitung nilai multi bulan dari filter aktif
          const akumulasiFilter = hitungGajiMultiBulan(selectedFilterMonths)

          const keyGajiPeriod = `${tahunAktif}-${String(bulanAktif + 1).padStart(2, '0')}`
          const gajianLunas = statusGaji[keyGajiPeriod] || false

          const bukaFormShift = (tanggal) => {
            const key = formatKeKey(tahunAktif, bulanAktif, tanggal)
            const shiftAda = dataShift[key]
            setTanggalPilihan(tanggal)
            setTipeShiftPilihan(shiftAda ? shiftAda.tipe : 'Libur')
            setCatatanPilihan(shiftAda ? (shiftAda.catatan || '') : '')
            
            const statusTercatat = shiftAda && shiftAda.tipe !== 'Libur'
            setSudahTercatat(statusTercatat)
            setTampilkanKonfirmasiHapus(false)
            
            setTampilkanModal(true)
          }

          const simpanShift = () => {
            const key = formatKeKey(tahunAktif, bulanAktif, tanggalPilihan)
            const dataBaru = { ...dataShift }

            dataBaru[key] = {
              tipe: tipeShiftPilihan,
              catatan: catatanPilihan
            }

            setDataShift(dataBaru)
            setTampilkanModal(false)
            pemicuNotifikasi(`Shift tanggal ${tanggalPilihan} berhasil disimpan`)
          }

          const hapusShift = () => {
            const key = formatKeKey(tahunAktif, bulanAktif, tanggalPilihan)
            const dataBaru = { ...dataShift }
            
            if (dataBaru[key]) {
              delete dataBaru[key]
              setDataShift(dataBaru)
            }
            
            setTampilkanModal(false)
            setTampilkanKonfirmasiHapus(false)
            pemicuNotifikasi(`Data shift tanggal ${tanggalPilihan} telah dihapus`)
          }

          const muatDataUlang = () => {
            setDataShift(DATA_AWAL)
            setTampilkanKonfirmasiKosongkan(false)
            pemicuNotifikasi("Semua jadwal kerja Anda berhasil dikosongkan!")
          }

          const bukaModalFilter = () => {
            setTempBulan(bulanAktif)
            setTempTahun(tahunAktif)
            setTampilkanFilterModal(true)
          }

          const simpanFilter = () => {
            setBulanAktif(tempBulan)
            setTahunAktif(tempTahun)
            setTampilkanFilterModal(false)
          }

          // Pembuka Modal Multi Filter
          const bukaModalMultiFilter = () => {
            setTempSelectedMonths([...selectedFilterMonths])
            setTampilkanMultiFilterModal(true)
          }

          const handleToggleMonthSelection = (year, monthIdx) => {
            const formatKey = `${year}-${String(monthIdx + 1).padStart(2, '0')}`
            if (tempSelectedMonths.includes(formatKey)) {
              setTempSelectedMonths(tempSelectedMonths.filter(m => m !== formatKey))
            } else {
              setTempSelectedMonths([...tempSelectedMonths, formatKey])
            }
          }

          const terapkanMultiFilter = () => {
            if (tempSelectedMonths.length === 0) {
              pemicuNotifikasi("Silakan pilih minimal 1 bulan!")
              return
            }
            setSelectedFilterMonths(tempSelectedMonths)
            setTampilkanMultiFilterModal(false)
            pemicuNotifikasi("Filter akumulasi bulan berhasil diterapkan!")
          }

          const eksporData = () => {
            try {
              const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataShift))
              const downloadAnchor = document.createElement('a')
              downloadAnchor.setAttribute("href", dataStr)
              downloadAnchor.setAttribute("download", `cadangan_nescafe_tracker_${new Date().toISOString().split('T')[0]}.json`)
              document.body.appendChild(downloadAnchor)
              downloadAnchor.click()
              downloadAnchor.remove()
              pemicuNotifikasi("Cadangan JSON berhasil diunduh!")
            } catch (e) {
              pemicuNotifikasi("Gagal mengekspor data cadangan.")
            }
          }

          const imporData = (event) => {
            const file = event.target.files[0]
            if (!file) return
            const reader = new FileReader()
            reader.onload = (e) => {
              try {
                const parsed = JSON.parse(e.target.result)
                if (typeof parsed === 'object' && parsed !== null) {
                  setDataShift(parsed)
                  pemicuNotifikasi("Data cadangan berhasil dipasang!")
                } else {
                  pemicuNotifikasi("Format file cadangan salah!")
                }
              } catch (err) {
                pemicuNotifikasi("Gagal membaca file cadangan!")
              }
            }
            reader.readAsText(file)
          }

          const bukaModalLaporan = (tipe) => {
            setTipeLaporan(tipe)
            setTampilkanModalLaporan(true)
          }

          const dapatkanTeksLaporan = () => {
            const namaText = namaKaryawan.trim() ? namaKaryawan : '[Nama Anda]'
            const statusText = gajianLunas ? 'LUNAS (Sudah Diterima)' : 'BELUM CAIR'
            if (tipeLaporan === 'tutupBuku') {
              return `Laporan Gaji Nescafe - Sistem Tutup Buku
Nama: ${namaText}
Periode: ${tutupBuku.labelPeriode} (Gajian: ${tutupBuku.labelGajian})
Status Pembayaran: ${statusText}

Rincian Kerja:
- Shift Pagi: ${tutupBuku.pagi}x (Rp ${(tutupBuku.pagi * 70000).toLocaleString('id-ID')})
- Shift Sore: ${tutupBuku.sore}x (Rp ${(tutupBuku.sore * 70000).toLocaleString('id-ID')})
- Long Shift: ${tutupBuku.long}x (Rp ${(tutupBuku.long * 140000).toLocaleString('id-ID')})
-----------------------------
Total Gaji: Rp ${tutupBuku.total.toLocaleString('id-ID')}`
            } else {
              return `Laporan Gaji Nescafe - Gaji Bulanan
Nama: ${namaText}
Bulan: ${daftarBulan[bulanAktif]} ${tahunAktif}

Rincian Kerja:
- Shift Pagi: ${murni.pagi}x (Rp ${(murni.pagi * 70000).toLocaleString('id-ID')})
- Shift Sore: ${murni.sore}x (Rp ${(murni.sore * 70000).toLocaleString('id-ID')})
- Long Shift: ${murni.long}x (Rp ${(murni.long * 140000).toLocaleString('id-ID')})
-----------------------------
Total Gaji: Rp ${murni.total.toLocaleString('id-ID')}`
            }
          }

          const salinTeksKeClipboard = () => {
            const teks = dapatkanTeksLaporan()
            const inputTeks = document.createElement('textarea')
            inputTeks.value = teks
            inputTeks.style.position = 'fixed'
            inputTeks.style.opacity = '0'
            document.body.appendChild(inputTeks)
            inputTeks.select()
            try {
              document.execCommand('copy')
              pemicuNotifikasi("Teks laporan berhasil disalin!")
            } catch (err) {
              pemicuNotifikasi("Gagal menyalin teks laporan.")
            }
            document.body.removeChild(inputTeks)
          }

          // Fungsi render kalender dinamis berdasarkan kode 'YYYY-MM' hasil multi filter
          const renderKalenderFilterBulan = (tahunBulanStr) => {
            const [thnStr, blnStr] = tahunBulanStr.split('-')
            const thnVal = parseInt(thnStr)
            const blnVal = parseInt(blnStr) - 1

            const jlhHariArsip = new Date(thnVal, blnVal + 1, 0).getDate()
            const hariPertamaArsip = new Date(thnVal, blnVal, 1).getDay()

            return (
              <div key={tahunBulanStr} className="bg-stone-50 p-4 rounded-xl border border-stone-200 shadow-sm space-y-3">
                <div className="flex justify-between items-center border-b border-stone-200 pb-2">
                  <span className="font-bold text-sm text-stone-850">
                    {daftarBulan[blnVal]} {thnVal}
                  </span>
                  <span className="text-xs bg-amber-100 text-amber-950 px-2 py-0.5 rounded font-black">
                    Rp {hitungGajiMurniBulan(thnVal, blnVal).total.toLocaleString('id-ID')}
                  </span>
                </div>

                <div className="grid grid-cols-7 gap-1 text-center font-bold text-[9px] text-stone-400 uppercase">
                  <div>Min</div>
                  <div>Sen</div>
                  <div>Sel</div>
                  <div>Rab</div>
                  <div>Kam</div>
                  <div>Jum</div>
                  <div>Sab</div>
                </div>

                <div className="grid grid-cols-7 gap-1">
                  {Array.from({ length: hariPertamaArsip }).map((_, idx) => (
                    <div key={`empty-filter-${tahunBulanStr}-${idx}`} className="rounded-lg bg-stone-100/50 h-8"></div>
                  ))}

                  {Array.from({ length: jlhHariArsip }).map((_, idx) => {
                    const tanggal = idx + 1
                    const key = formatKeKey(thnVal, blnVal, tanggal)
                    const shift = dataShift[key]

                    let bgKelas = "bg-white border-stone-200 text-stone-700"
                    
                    if (shift) {
                      if (shift.tipe === 'Pagi') {
                        bgKelas = "shift-biru-pagi"
                      } else if (shift.tipe === 'Sore') {
                        bgKelas = "shift-kuning-sore"
                      } else if (shift.tipe === 'Long') {
                        bgKelas = "shift-api-long"
                      } else if (shift.tipe === 'Libur') {
                        bgKelas = "shift-dongker-off"
                      }
                    }

                    return (
                      <div
                        key={`hari-filter-${tahunBulanStr}-${tanggal}`}
                        className={`rounded-lg p-1 flex flex-col justify-between items-start border text-left cursor-default h-8 text-[8px] ${bgKelas}`}
                      >
                        <span className="font-bold opacity-90">{tanggal}</span>
                        {shift && shift.tipe !== 'Libur' && (
                          <span className="text-[6px] font-black uppercase tracking-tighter block self-stretch text-center leading-none">
                            {shift.tipe}
                          </span>
                        )}
                        {shift && shift.tipe === 'Libur' && (
                          <span className="text-[6px] opacity-75 italic block self-stretch text-center leading-none">Off</span>
                        )}
                      </div>
                    )
                  })}
                </div>
              </div>
            )
          }

          return (
            <div className="bg-stone-100 min-h-screen pb-12 text-stone-800 relative">
              {notifikasi && (
                <div className="fixed bottom-5 right-5 bg-stone-900 text-white px-4 py-3 rounded-xl shadow-2xl z-50 flex items-center gap-2 border border-stone-750 transition-all text-xs animate-bounce">
                  <svg className="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                  <span className="font-semibold">{notifikasi}</span>
                </div>
              )}

              <header className="bg-amber-950 text-white py-4 px-4 shadow-md mb-6">
                <div className="max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                  <div className="flex items-center gap-3">
                    <div className="rounded-full p-2 bg-amber-800 text-white flex items-center justify-center w-11 h-11">
                      <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                      </svg>
                    </div>
                    <div>
                      <h1 className="text-xl font-bold tracking-wide m-0 text-white">Nescafe Booth Tracker</h1>
                      <p className="text-xs text-amber-200 m-0">Pencatat Shift Kalender & Perhitungan Gaji</p>
                    </div>
                  </div>
                  <div className="px-4 py-2 rounded-xl text-center sm:text-right bg-amber-900">
                    <span className="block text-amber-300 font-bold uppercase tracking-wider text-[10px]">Aturan Perusahaan</span>
                    <span className="block text-xs font-semibold text-white">Tutup Buku Tgl 20, Gajian Tgl 25</span>
                  </div>
                </div>
              </header>

              <div className="max-w-4xl mx-auto px-4 mb-6">
                <div className="flex justify-center bg-white p-1.5 rounded-xl shadow-sm border border-stone-200">
                  <button 
                    className={`flex-1 py-2 px-4 rounded-lg font-bold text-sm transition-all ${tabAktif === 'kalender' ? 'bg-amber-950 text-white shadow-sm' : 'text-stone-600 hover:bg-stone-50'}`}
                    onClick={() => setTabAktif('kalender')}
                  >
                    Kalender Kerja
                  </button>
                  <button 
                    className={`flex-1 py-2 px-4 rounded-lg font-bold text-sm transition-all ${tabAktif === 'perhitungan' ? 'bg-amber-950 text-white shadow-sm' : 'text-stone-600 hover:bg-stone-50'}`}
                    onClick={() => setTabAktif('perhitungan')}
                  >
                    Akumulasi & Perhitungan Gaji
                  </button>
                </div>
              </div>

              <main className="max-w-4xl mx-auto px-4">
                {tabAktif === 'kalender' ? (
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="space-y-6">
                      <button 
                        onClick={bukaModalFilter} 
                        className="w-full bg-white hover:bg-stone-50 text-stone-800 font-bold py-3 px-4 rounded-2xl shadow-sm border border-stone-300 flex items-center justify-center gap-2 transition"
                      >
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" className="text-amber-800" viewBox="0 0 16 16">

                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* MODAL POPUP MULTI-BULAN FILTER AKUMULASI */}
              {tampilkanMultiFilterModal && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                  <div className="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl border border-stone-200 max-h-[90vh] flex flex-col">
                    <div className="bg-amber-950 text-white p-4">
                      <h5 className="font-bold text-base m-0">Filter Akumulasi Multi-Bulan</h5>
                      <p className="text-xs text-amber-200 m-0">Pilih beberapa bulan untuk dihitung sekaligus</p>
                    </div>

                    <div className="p-4 overflow-y-auto flex-1 space-y-6">
                      <div className="flex gap-2 justify-end text-xs">
                        <button 
                          onClick={() => {
                            const semuaBulan = []
                            daftarTahun.forEach(thn => {
                              daftarBulan.forEach((_, idx) => {
                                semuaBulan.push(`${thn}-${String(idx + 1).padStart(2, '0')}`)
                              })
                            })
                            setTempSelectedMonths(semuaBulan)
                          }}
                          className="text-amber-800 hover:underline font-bold"
                        >
                          Pilih Semua
                        </button>
                        <span className="text-stone-300">|</span>
                        <button 
                          onClick={() => setTempSelectedMonths([])}
                          className="text-stone-500 hover:underline font-bold"
                        >
                          Hapus Semua
                        </button>
                      </div>

                      {daftarTahun.map(thn => (
                        <div key={thn} className="space-y-2 border-b border-stone-100 pb-4 last:border-0 last:pb-0">
                          <span className="text-xs font-black text-amber-950 block">{thn}</span>
                          <div className="grid grid-cols-3 gap-2">
                            {daftarBulan.map((bln, idx) => {
                              const formatKey = `${thn}-${String(idx + 1).padStart(2, '0')}`
                              const isChecked = tempSelectedMonths.includes(formatKey)
                              return (
                                <button
                                  key={idx}
                                  type="button"
                                  onClick={() => handleToggleMonthSelection(thn, idx)}
                                  className={`py-2 px-3 text-xs font-semibold rounded-xl border flex items-center justify-between transition ${
                                    isChecked 
                                      ? 'bg-amber-950 border-amber-950 text-white shadow-sm font-bold' 
                                      : 'bg-white border-stone-200 hover:bg-stone-50 text-stone-700'
                                  }`}
                                >
                                  <span>{bln}</span>
                                  {isChecked && (
                                    <svg className="w-3.5 h-3.5 text-amber-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                                    </svg>
                                  )}
                                </button>
                              )
                            })}
                          </div>
                        </div>
                      ))}
                    </div>

                    <div className="bg-stone-50 px-4 py-3 flex gap-2 border-t border-stone-150 justify-end">
                      <button 
                        onClick={() => setTampilkanMultiFilterModal(false)} 
                        className="px-4 py-2 bg-stone-200 text-stone-700 hover:bg-stone-300 rounded-xl text-xs font-bold transition"
                      >
                        Batal
                      </button>
                      <button 
                        onClick={terapkanMultiFilter} 
                        className="px-4 py-2 bg-amber-950 hover:bg-amber-900 text-white rounded-xl text-xs font-bold transition"
                      >
                        Terapkan Filter ({tempSelectedMonths.length})
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {tampilkanModal && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                  <div className="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl border border-stone-200">
                    <div className="bg-amber-950 text-white p-4 flex justify-between items-start">
                      <div>
                        <h5 className="font-bold text-base m-0">Ubah Jadwal Kerja</h5>
                        <p className="m-0 text-amber-200 text-xs mt-1">
                          Tanggal: {tanggalPilihan} {daftarBulan[bulanAktif]} {tahunAktif}
                        </p>
                      </div>
                      <button 
                        onClick={() => setTampilkanModal(false)}
                        className="text-white hover:text-amber-200 text-xl font-bold focus:outline-none"
                      >
                        &times;
                      </button>
                    </div>
                    
                    <div className="p-4 space-y-4">
                      {tampilkanKonfirmasiHapus ? (
                        <div className="bg-red-50 p-4 rounded-xl border border-red-200 text-center space-y-3">
                          <p className="text-xs font-bold text-red-800 m-0">Apakah Anda yakin ingin menghapus jadwal kerja pada tanggal ini?</p>
                          <div className="flex gap-2 justify-center">
                            <button 
                              onClick={() => setTampilkanKonfirmasiHapus(false)}
                              className="px-3 py-1.5 bg-stone-200 text-stone-700 font-bold text-[11px] rounded-lg"
                            >
                              Batal
                            </button>
                            <button 
                              onClick={hapusShift}
                              className="px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white font-bold text-[11px] rounded-lg transition"
                            >
                              Ya, Hapus
                            </button>
                          </div>
                        </div>
                      ) : (
                        <>
                          <div>
                            <label className="block text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-2">
                              Pilih Jenis Shift Kerja
                            </label>
                            <div className="grid grid-cols-2 gap-2">
                              <button 
                                onClick={() => setTipeShiftPilihan('Pagi')}
                                className={`py-2.5 px-2 text-xs font-bold rounded-xl border transition ${tipeShiftPilihan === 'Pagi' ? 'bg-blue-600 border-blue-700 text-white shadow-sm' : 'bg-white border-stone-200 hover:bg-stone-50'}`}
                              >
                                Pagi (70k)
                              </button>
                              <button 
                                onClick={() => setTipeShiftPilihan('Sore')}
                                className={`py-2.5 px-2 text-xs font-bold rounded-xl border transition ${tipeShiftPilihan === 'Sore' ? 'bg-yellow-400 border-yellow-500 text-stone-900 shadow-sm' : 'bg-white border-stone-200 hover:bg-stone-50'}`}
                              >
                                Sore (70k)
                              </button>
                              <button 
                                onClick={() => setTipeShiftPilihan('Long')}
                                className={`col-span-2 py-2.5 px-2 text-xs font-bold rounded-xl border transition ${tipeShiftPilihan === 'Long' ? 'bg-gradient-to-r from-red-600 to-orange-500 border-red-700 text-white shadow-sm' : 'bg-white border-stone-200 hover:bg-stone-50'}`}
                              >
                                Long Shift (140k)
                              </button>
                              
                              <button 
                                onClick={() => setTipeShiftPilihan('Libur')}
                                className={`col-span-2 py-2.5 px-2 text-xs font-bold rounded-xl border transition ${tipeShiftPilihan === 'Libur' ? 'bg-slate-900 border-slate-950 text-white shadow-sm' : 'bg-white border-stone-200 hover:bg-stone-50'}`}
                              >
                                Libur / Off
                              </button>
                            </div>
                          </div>

                          <div>
                            <label className="block text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-1">Catatan Tambahan</label>
                            <input 
                              type="text" 
                              value={catatanPilihan} 
                              onChange={(e) => setCatatanPilihan(e.target.value)}
                              placeholder="Masukkan catatan jika ada"
                              className="w-full border border-stone-300 p-2 text-xs rounded-xl outline-none"
                            />
                          </div>
                        </>
                      )}
                    </div>

                    <div className="bg-stone-50 px-4 py-3 flex gap-2 border-t border-stone-150 justify-between items-center">
                      <div>
                        {sudahTercatat && !tampilkanKonfirmasiHapus && (
                          <button 
                            onClick={() => setTampilkanKonfirmasiHapus(true)}
                            className="text-red-600 hover:text-red-800 text-xs font-bold transition focus:outline-none"
                          >
                            Hapus Shift
                          </button>
                        )}
                      </div>
                      <div className="flex gap-2">
                        <button 
                          onClick={() => setTampilkanModal(false)} 
                          className="px-4 py-2 bg-stone-200 hover:bg-stone-300 text-stone-700 text-xs font-bold rounded-xl"
                        >
                          Batal
                        </button>
                        {!tampilkanKonfirmasiHapus && (
                          <button 
                            onClick={simpanShift} 
                            className="px-4 py-2 bg-amber-950 hover:bg-amber-900 text-white text-xs font-bold rounded-xl shadow-sm"
                          >
                            Simpan
                          </button>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {tampilkanModalLaporan && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                  <div className="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl border border-stone-200">
                    <div className="bg-amber-950 text-white p-4">
                      <h5 className="font-bold text-base m-0">Bagikan Laporan Kerja</h5>
                      <p className="m-0 text-amber-200 text-xs mt-1">Siap dikirim ke admin lewat WhatsApp</p>
                    </div>
                    
                    <div className="p-4 space-y-4">
                      <div>
                        <label className="block text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-1">Nama Barista (Anda)</label>
                        <input 
                          type="text" 
                          value={namaKaryawan} 
                          onChange={(e) => setNamaKaryawan(e.target.value)}
                          placeholder="Masukkan nama Anda"
                          className="w-full border border-stone-300 p-2 text-xs rounded-xl outline-none text-stone-850"
                        />
                      </div>

                      <div>
                        <label className="block text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-1">Pilih Jenis Laporan</label>
                        <div className="grid grid-cols-2 gap-2">
                          <button 
                            onClick={() => setTipeLaporan('tutupBuku')}
                            className={`py-2 text-[11px] font-bold rounded-lg border transition ${tipeLaporan === 'tutupBuku' ? 'bg-amber-950 text-white border-amber-950 shadow-sm' : 'bg-stone-50 text-stone-700 border-stone-200 hover:bg-stone-100'}`}
                          >
                            Sistem Tutup Buku
                          </button>
                          <button 
                            onClick={() => setTipeLaporan('murni')}
                            className={`py-2 text-[11px] font-bold rounded-lg border transition ${tipeLaporan === 'murni' ? 'bg-amber-950 text-white border-amber-950 shadow-sm' : 'bg-stone-50 text-stone-700 border-stone-200 hover:bg-stone-100'}`}
                          >
                            Kalender Murni
                          </button>
                        </div>
                      </div>

                      <div>
                        <label className="block text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-1">Pratinjau Pesan Laporan</label>
                        <textarea 
                          readOnly 
                          value={dapatkanTeksLaporan()} 
                          className="w-full h-36 bg-stone-50 border border-stone-200 p-2.5 text-[10px] rounded-xl font-mono text-stone-600 outline-none resize-none"
                        />
                      </div>
                    </div>

                    <div className="bg-stone-50 px-4 py-3 flex gap-2 border-t border-stone-150 justify-between items-center">
                      <button 
                        onClick={salinTeksKeClipboard}
                        className="px-3 py-2 bg-stone-200 hover:bg-stone-300 text-stone-700 text-xs font-bold rounded-xl flex items-center gap-1.5 transition"
                      >
                        Salin Teks
                      </button>
                      <div className="flex gap-2">
                        <button 
                          onClick={() => setTampilkanModalLaporan(false)} 
                          className="px-4 py-2 bg-stone-200 hover:bg-stone-300 text-stone-750 text-xs font-bold rounded-xl focus:outline-none"
                        >
                          Batal
                        </button>
                        <button 
                          onClick={() => {
                            const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(dapatkanTeksLaporan())}`
                            window.open(url, '_blank')
                            pemicuNotifikasi("Membuka WhatsApp...")
                          }}
                          className="px-4 py-2 text-white text-xs font-bold rounded-xl flex items-center gap-1.5 shadow-sm transition focus:outline-none"
                          style={{ backgroundColor: '#059669' }}
                        >
                          Kirim WA
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* MODAL KONFIRMASI KOSONGKAN JADWAL */}
              {tampilkanKonfirmasiKosongkan && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                  <div className="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl border border-stone-200">
                    <div className="bg-red-950 text-white p-4">
                      <h5 className="font-bold text-base m-0">Kosongkan Semua Data?</h5>
                    </div>
                    <div className="p-4 space-y-3">
                      <p className="text-xs text-stone-600 m-0 leading-relaxed">
                        Tindakan ini akan menghapus seluruh data jadwal kerja dan riwayat gaji yang tersimpan pada aplikasi secara permanen.
                      </p>
                      <p className="text-xs font-bold text-red-700 m-0">
                        Apakah Anda sangat yakin ingin melanjutkan?
                      </p>
                    </div>
                    <div className="bg-stone-50 px-4 py-3 flex gap-2 border-t border-stone-150 justify-end">
                      <button 
                        onClick={() => setTampilkanKonfirmasiKosongkan(false)} 
                        className="px-4 py-2 bg-stone-200 hover:bg-stone-300 text-stone-700 text-xs font-bold rounded-xl"
                      >
                        Batal
                      </button>
                      <button 
                        onClick={muatDataUlang} 
                        className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-xs font-bold rounded-xl shadow-sm transition"
                      >
                        Ya, Hapus Semua
                      </button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          )
        }

        const container = document.getElementById('root')
        const root = ReactDOM.createRoot(container)
        root.render(<App />)
    </script>
</body>
</html>
